<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login Completo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #111827, #3b0764, #2563eb);
      color: white;
    }

    .card {
      width: 380px;
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.13);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 70px rgba(0,0,0,.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #ddd;
      margin-bottom: 28px;
    }

    .group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: rgba(255,255,255,.2);
      color: white;
      outline: none;
      font-size: 15px;
    }

    input::placeholder {
      color: #ccc;
    }

    input.error {
      border-color: #ff6b6b;
      background: rgba(255, 0, 0, 0.12);
    }

    .error-text {
      margin-top: 6px;
      color: #ffb4b4;
      font-size: 13px;
      min-height: 18px;
    }

    .password-box {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 13px;
      color: #caf0f8;
      user-select: none;
    }

    .options {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin: 12px 0 22px;
    }

    .options a {
      color: #caf0f8;
      text-decoration: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #22d3ee, #7c3aed);
      color: white;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(34, 211, 238, .3);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .alert {
      display: none;
      margin-bottom: 18px;
      padding: 12px;
      border-radius: 14px;
      font-size: 14px;
      text-align: center;
    }

    .alert.error {
      display: block;
      background: rgba(255, 77, 77, 0.18);
      color: #ffd1d1;
      border: 1px solid rgba(255, 77, 77, .4);
    }

    .alert.success {
      display: block;
      background: rgba(34, 197, 94, 0.18);
      color: #bbf7d0;
      border: 1px solid rgba(34, 197, 94, .4);
    }

    .register {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
    }

    .register a {
      color: #caf0f8;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <form class="card" id="loginForm">
    <h1>Bienvenido</h1>
    <p class="subtitle">Inicia sesión con estilo</p>

    <div id="alert" class="alert"></div>

    <div class="group">
      <label for="email">Correo electrónico</label>
      <input type="email" id="email" placeholder="usuario@email.com" />
      <div class="error-text" id="emailError"></div>
    </div>

    <div class="group">
      <label for="password">Contraseña</label>
      <div class="password-box">
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
        <span class="toggle" id="togglePassword">Ver</span>
      </div>
      <div class="error-text" id="passwordError"></div>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" id="remember" />
        Recordarme
      </label>
      <a href="#">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" id="btnLogin">Iniciar sesión</button>

    <div class="register">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>
  </form>

  <script>
    const form = document.getElementById("loginForm");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const alertBox = document.getElementById("alert");
    const btnLogin = document.getElementById("btnLogin");
    const togglePassword = document.getElementById("togglePassword");

    // Usuario válido de prueba
    const userCorrecto = {
      email: "admin@email.com",
      password: "123456"
    };

    togglePassword.addEventListener("click", () => {
      if (password.type === "password") {
        password.type = "text";
        togglePassword.textContent = "Ocultar";
      } else {
        password.type = "password";
        togglePassword.textContent = "Ver";
      }
    });

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      limpiarErrores();

      const emailValue = email.value.trim();
      const passwordValue = password.value.trim();

      let hayError = false;

      if (emailValue === "") {
        mostrarError(email, emailError, "El correo es obligatorio.");
        hayError = true;
      } else if (!validarEmail(emailValue)) {
        mostrarError(email, emailError, "Escribe un correo válido.");
        hayError = true;
      }

      if (passwordValue === "") {
        mostrarError(password, passwordError, "La contraseña es obligatoria.");
        hayError = true;
      } else if (passwordValue.length < 6) {
        mostrarError(password, passwordError, "La contraseña debe tener mínimo 6 caracteres.");
        hayError = true;
      }

      if (hayError) return;

      btnLogin.disabled = true;
      btnLogin.textContent = "Verificando...";

      setTimeout(() => {
        if (
          emailValue === userCorrecto.email &&
          passwordValue === userCorrecto.password
        ) {
          mostrarAlerta("Inicio de sesión exitoso. Bienvenido, crack.", "success");
          btnLogin.textContent = "Entrando...";

          setTimeout(() => {
            window.location.href = "#dashboard";
          }, 1000);

        } else {
          mostrarAlerta("Correo o contraseña incorrectos. Intenta nuevamente.", "error");
          password.value = "";
          password.focus();
          btnLogin.disabled = false;
          btnLogin.textContent = "Iniciar sesión";
        }
      }, 900);
    });

    function validarEmail(valor) {
      const regex = /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/;
      return regex.test(valor);
    }

    function mostrarError(input, contenedor, mensaje) {
      input.classList.add("error");
      contenedor.textContent = mensaje;
    }

    function limpiarErrores() {
      email.classList.remove("error");
      password.classList.remove("error");
      emailError.textContent = "";
      passwordError.textContent = "";
      alertBox.className = "alert";
      alertBox.textContent = "";
    }

    function mostrarAlerta(mensaje, tipo) {
      alertBox.textContent = mensaje;
      alertBox.className = "alert " + tipo;
    }
  </script>

</body>
</html>
