<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #4c1d95, #2563eb);
      color: white;
    }

    .card {
      width: 380px;
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(18px);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
    }

    h1 {
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #e5e7eb;
      margin-bottom: 25px;
    }

    .alert {
      display: none;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 14px;
      text-align: center;
      font-size: 14px;
    }

    .alert.error {
      display: block;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fecaca;
    }

    .alert.success {
      display: block;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.5);
      color: #bbf7d0;
    }

    .group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.22);
      color: white;
      outline: none;
      font-size: 15px;
    }

    input::placeholder {
      color: #d1d5db;
    }

    input.error-input {
      border-color: #fb7185;
      background: rgba(239, 68, 68, 0.14);
    }

    .error-text {
      min-height: 18px;
      margin-top: 6px;
      color: #fecaca;
      font-size: 13px;
    }

    .password-box {
      position: relative;
    }

    .toggle {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #bae6fd;
      font-size: 13px;
      user-select: none;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 22px;
      font-size: 14px;
    }

    a {
      color: #bae6fd;
      text-decoration: none;
      font-weight: 600;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #22d3ee, #7c3aed);
      color: white;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(34, 211, 238, 0.3);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .register {
      margin-top: 22px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <form class="card" id="loginForm">
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Accede con tu número de usuario</p>

    <div id="alert" class="alert"></div>

    <div class="group">
      <label for="usuario">Usuario</label>
      <input 
        type="text" 
        id="usuario" 
        placeholder="Ej: 1087812026" 
        maxlength="10"
      />
      <div class="error-text" id="usuarioError"></div>
    </div>

    <div class="group">
      <label for="password">Contraseña</label>
      <div class="password-box">
        <input 
          type="password" 
          id="password" 
          placeholder="Ingresa tu contraseña"
        />
        <span class="toggle" id="togglePassword">Ver</span>
      </div>
      <div class="error-text" id="passwordError"></div>
    </div>

    <div class="options">
      <label>
        <input type="checkbox" id="remember" />
        Recordarme
      </label>

      <a href="recuperar.html">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" id="btnLogin">Entrar</button>

    <div class="register">
      ¿No tienes cuenta? <a href="registro.html">Crear cuenta</a>
    </div>
  </form>

  <script>
    const form = document.getElementById("loginForm");
    const usuario = document.getElementById("usuario");
    const password = document.getElementById("password");
    const usuarioError = document.getElementById("usuarioError");
    const passwordError = document.getElementById("passwordError");
    const alertBox = document.getElementById("alert");
    const btnLogin = document.getElementById("btnLogin");
    const togglePassword = document.getElementById("togglePassword");

    const usuarioCorrecto = "1087812026";
    const passwordCorrecta = "123456";

    togglePassword.addEventListener("click", () => {
      if (password.type === "password") {
        password.type = "text";
        togglePassword.textContent = "Ocultar";
      } else {
        password.type = "password";
        togglePassword.textContent = "Ver";
      }
    });

    form.addEventListener("submit", function(event) {
      event.preventDefault();

      limpiarErrores();

      const usuarioValue = usuario.value.trim();
      const passwordValue = password.value.trim();

      let error = false;

      if (usuarioValue === "") {
        mostrarError(usuario, usuarioError, "El usuario es obligatorio.");
        error = true;
      } else if (!/^[0-9]+$/.test(usuarioValue)) {
        mostrarError(usuario, usuarioError, "El usuario solo debe tener números.");
        error = true;
      } else if (usuarioValue.length !== 10) {
        mostrarError(usuario, usuarioError, "El usuario debe tener 10 dígitos.");
        error = true;
      }

      if (passwordValue === "") {
        mostrarError(password, passwordError, "La contraseña es obligatoria.");
        error = true;
      } else if (passwordValue.length < 6) {
        mostrarError(password, passwordError, "La contraseña debe tener mínimo 6 caracteres.");
        error = true;
      }

      if (error) return;

      btnLogin.disabled = true;
      btnLogin.textContent = "Verificando...";

      setTimeout(() => {
        if (usuarioValue === usuarioCorrecto && passwordValue === passwordCorrecta) {
          mostrarAlerta("Ingreso exitoso. Redirigiendo...", "success");

          setTimeout(() => {
            window.location.href = "dashboard.html";
          }, 1000);

        } else {
          mostrarAlerta("Usuario o contraseña incorrectos.", "error");
          password.value = "";
          password.focus();
          btnLogin.disabled = false;
          btnLogin.textContent = "Entrar";
        }
      }, 800);
    });

    function mostrarError(input, contenedor, mensaje) {
      input.classList.add("error-input");
      contenedor.textContent = mensaje;
    }

    function limpiarErrores() {
      usuario.classList.remove("error-input");
      password.classList.remove("error-input");
      usuarioError.textContent = "";
      passwordError.textContent = "";
      alertBox.className = "alert";
      alertBox.textContent = "";
    }

    function mostrarAlerta(mensaje, tipo) {
      alertBox.textContent = mensaje;
      alertBox.className = "alert " + tipo;
    }
  </script>

</body>
</html>
