<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #151515, #3a0ca3, #4361ee);
      overflow: hidden;
    }

    .login-card {
      width: 360px;
      padding: 35px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.35);
      color: white;
      animation: appear 0.7s ease;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-card h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .login-card p {
      text-align: center;
      margin-bottom: 30px;
      color: #e0e0e0;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.9rem;
    }

    .input-group input {
      width: 100%;
      padding: 13px 15px;
      border: none;
      outline: none;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1rem;
    }

    .input-group input::placeholder {
      color: #d6d6d6;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      margin-bottom: 25px;
    }

    .options a {
      color: #caf0f8;
      text-decoration: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #4cc9f0, #7209b7);
      color: white;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 25px rgba(76, 201, 240, 0.35);
    }

    .register {
      text-align: center;
      margin-top: 22px;
      font-size: 0.9rem;
    }

    .register a {
      color: #caf0f8;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <form class="login-card">
    <h1>Bienvenido</h1>
    <p>Entra a tu cuenta sin drama</p>

    <div class="input-group">
      <label for="email">Correo</label>
      <input type="email" id="email" placeholder="laisecasantiago8@gmail.com" required />
    </div>

    <div class="input-group">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="12345" required />
    </div>

    <div class="options">
      <label>
        <input type="checkbox" />
        Recordarme
      </label>
      <a href="#">¿Olvidaste?</a>
    </div>

    <button type="submit">Iniciar sesión</button>

    <div class="register">
      ¿No tienes cuenta? <a href="#">Regístrate</a>
    </div>
  </form>
</body>
</html>
